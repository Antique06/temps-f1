<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>F1 - Profil</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h1>👤 Mon profil</h1>

<div class="card">
  <div id="userName">Non connecté</div>
  <button id="loginBtn">Se connecter avec Google</button>
  <button id="logoutBtn" style="display:none">Se déconnecter</button>
  <button id="backBtn">⬅️ Retour</button>

  <h3>Meilleurs temps par circuit</h3>
  <div id="bestTimes">Chargement...</div>
</div>

<script type="module">
import { setupAuthButtons, getCurrentUser } from "./js/auth.js";

setupAuthButtons("loginBtn", "logoutBtn", "userName");

document.getElementById("backBtn").addEventListener("click", () => {
  window.location.href = "index.html";
});

getCurrentUser(async user => {
  if (!user) {
    document.getElementById("bestTimes").innerHTML = "<p>Connecte-toi pour voir tes temps.</p>";
    return;
  }

  try {
    const mod = await import("./js/app.js");
    const { getUserBestTimesByCircuit, formatTime, getTopTimesForTrack } = mod;

    const bestTimes = await getUserBestTimesByCircuit(user.displayName);
    const bestTimesDiv = document.getElementById("bestTimes");
    bestTimesDiv.innerHTML = "";

    const allTracks = ["Bahreïn", "Djeddah", "Australie", "Bakou", "Miami", "Monaco",
                       "Barcelone", "Canada", "Autriche", "Grande-Bretagne", "Hongrie", "Spa",
                       "Zandvoort", "Monza", "Singapour", "Suzuka", "Qatar",
                       "USA (Austin)", "Mexique", "Brésil", "Las Vegas", "Abu Dhabi"];

    for (const track of allTracks) {
      const div = document.createElement("div");
      div.className = "best-time"; // classe de base

      const timeInfo = bestTimes[track];
      let timeStr = "NA"; // par défaut si pas de temps

      if (timeInfo && timeInfo.time !== undefined) {
        timeStr = formatTime(timeInfo.time);

        // Déterminer le rang exact dans le top 3
        const topTimes = await getTopTimesForTrack(track);
        const userRank = topTimes.findIndex(t => t.name === user.displayName && t.time === timeInfo.time) + 1;

        if (userRank === 1) div.classList.add("gold");
        else if (userRank === 2) div.classList.add("silver");
        else if (userRank === 3) div.classList.add("bronze");
      }

      div.innerText = `${track}: ${timeStr}`;
      bestTimesDiv.appendChild(div);
    }

  } catch (err) {
    console.error("Erreur lors du chargement des temps :", err);
    document.getElementById("bestTimes").innerHTML = "<p>Erreur lors du chargement des temps.</p>";
  }
});
</script>

</body>
</html>
