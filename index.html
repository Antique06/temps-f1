<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>F1 - Choix du circuit</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h1>🏎️ Choisir un circuit</h1>

<div class="card">
  <input id="searchCircuit" type="text" placeholder="Rechercher un circuit...">
  <select id="trackSelect">
    <option value="">-- Choisir un circuit --</option>
    <option>Bahreïn</option>
    <option>Djeddah</option>
    <option>Australie</option>
    <option>Bakou</option>
    <option>Miami</option>
    <option>Monaco</option>
    <option>Barcelone</option>
    <option>Canada</option>
    <option>Autriche</option>
    <option>Grande-Bretagne</option>
    <option>Hongrie</option>
    <option>Spa</option>
    <option>Zandvoort</option>
    <option>Monza</option>
    <option>Singapour</option>
    <option>Suzuka</option>
    <option>Qatar</option>
    <option>USA (Austin)</option>
    <option>Mexique</option>
    <option>Brésil</option>
    <option>Las Vegas</option>
    <option>Abu Dhabi</option>
  </select>
  <button id="goBtn">Voir le classement</button>
</div>

<script>
const searchInput = document.getElementById("searchCircuit");
const select = document.getElementById("trackSelect");

// Filtre dynamique des circuits
searchInput.addEventListener("input", () => {
  const filter = searchInput.value.toLowerCase();
  Array.from(select.options).forEach(opt => {
    opt.style.display = opt.text.toLowerCase().includes(filter) ? "" : "none";
  });
});

// Bouton aller vers classement
document.getElementById("goBtn").addEventListener("click", () => {
  const track = select.value;
  if (!track) return alert("Choisis un circuit !");
  window.location.href = "circuit.html?track=" + encodeURIComponent(track);
});
</script>

</body>
</html>
