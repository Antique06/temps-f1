<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>F1 - Classement Circuit</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h1>🏎️ Classement F1</h1>

<div class="card">
  <div id="userName">Non connecté</div>
  <button id="loginBtn">Se connecter avec Google</button>
  <button id="logoutBtn" style="display:none">Se déconnecter</button>

  <h2 id="trackName"></h2>

  <button id="addTimeBtn">➕ Ajouter un temps</button>
  <button id="backBtn">⬅️ Retour</button>

  <h3>Top 3</h3>
  <ol id="top3"></ol>

  <h3>Classement complet</h3>
  <div id="results">Chargement...</div>

  <canvas id="chartTimes" width="400" height="150"></canvas>
</div>

<script type="module">
import { setupAuthButtons } from "./js/auth.js";
import { loadTimesForTrack } from "./js/app.js";

setupAuthButtons("loginBtn", "logoutBtn", "userName");

const urlParams = new URLSearchParams(window.location.search);
const track = urlParams.get("track");

if (!track) {
  alert("Aucun circuit sélectionné !");
  window.location.href = "index.html";
}

document.getElementById("trackName").innerText = track;
loadTimesForTrack(track);

document.getElementById("addTimeBtn").addEventListener("click", () => {
  window.location.href = "add-time.html?track=" + encodeURIComponent(track);
});
document.getElementById("backBtn").addEventListener("click", () => {
  window.location.href = "index.html";
});
</script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module" src="./js/charts.js"></script>

</body>
</html>
