<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Classement F1</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h1 id="title">🏎️ Classement</h1>

<div class="card">
  <h2 id="trackName"></h2>

  <button onclick="addTimePage()">➕ Ajouter un temps</button>
  <button onclick="goBack()">⬅️ Retour</button>

  <h3>Classement :</h3>
  <div id="results">Chargement...</div>
</div>

<script type="module">
import { loadTimesForTrack } from "./js/app.js";

const url = new URL(window.location.href);
const track = url.searchParams.get("track");

document.getElementById("trackName").innerText = track;

loadTimesForTrack(track);
</script>

<script>
function addTimePage() {
  const url = new URL(window.location.href);
  const track = url.searchParams.get("track");
  window.location.href = "add-time.html?track=" + encodeURIComponent(track);
}
</script>

</body>
</html>
